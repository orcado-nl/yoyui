<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>YoYui icon</title>
  <desc>Two Y letterforms, rotated to face vertically, meeting at a shared center point in a polished emblem</desc>

  <rect x="12" y="12" width="136" height="136" rx="32" fill="#F6F4FF"/>

  <defs>
    <clipPath id="ringClip">
      <circle cx="80" cy="80" r="7.5"/>
    </clipPath>
    <linearGradient id="overlapGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5B4FE0"/>
      <stop offset="100%" stop-color="#26C2B4"/>
    </linearGradient>
  </defs>

  <!-- top Y, opening downward into the center -->
  <path d="M48 38 C 48 58, 80 58, 80 78"
        fill="none" stroke="#5B4FE0" stroke-width="15" stroke-linecap="round"/>
  <path d="M112 38 C 112 58, 80 58, 80 78"
        fill="none" stroke="#5B4FE0" stroke-width="15" stroke-linecap="round"/>

  <!-- bottom Y, mirrored, opening upward into the center -->
  <path d="M48 122 C 48 102, 80 102, 80 82"
        fill="none" stroke="#26C2B4" stroke-width="15" stroke-linecap="round"/>
  <path d="M112 122 C 112 102, 80 102, 80 82"
        fill="none" stroke="#26C2B4" stroke-width="15" stroke-linecap="round"/>

  <!-- overlap, split into solid top/bottom halves, clipped to a small circle at the crossing point -->
  <path d="M72.5 80 A7.5 7.5 0 0 1 87.5 80 Z" fill="#26C2B4" clip-path="url(#ringClip)"/>
  <path d="M72.5 80 A7.5 7.5 0 0 0 87.5 80 Z" fill="#5B4FE0" clip-path="url(#ringClip)"/>
</svg>
